services:
  simulus:
    build: ./
    container_name: sim_c
    environment:
      - DISPLAY=$DISPLAY
    shm_size: '8gb'
    volumes:
      - .:/simulus
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
#              device_ids: ['0']
              count: all
